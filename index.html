<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1942 - Classic Arcade Shooter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }
  #gameContainer { position: relative; }
  canvas { display: block; border: 2px solid #1a3a5c; }
  #ui {
    position: absolute;
    top: 8px; left: 10px; right: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #e8e0d0;
    font-size: 14px;
    pointer-events: none;
    text-shadow: 1px 1px 3px #000;
    z-index: 10;
    font-weight: bold;
  }
  #livesDisplay { display: flex; gap: 3px; }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,10,0.9);
    color: #e8e0d0;
    z-index: 20;
    text-align: center;
  }
  #overlay .title-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 4px;
  }
  #overlay h1 {
    font-size: 56px;
    color: #cc3333;
    letter-spacing: 8px;
    text-shadow: 3px 3px 0 #5a1a1a, 0 0 20px rgba(200,50,50,0.3);
    font-family: 'Impact', 'Arial Black', sans-serif;
  }
  #overlay .year {
    font-size: 28px;
    color: #cc3333;
    font-family: 'Impact', 'Arial Black', sans-serif;
    text-shadow: 2px 2px 0 #5a1a1a;
  }
  #overlay .subtitle {
    font-size: 13px;
    color: #8a7a5a;
    margin-bottom: 24px;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  #overlay h2 { font-size: 32px; color: #c4a35a; margin-bottom: 10px; }
  #overlay p { font-size: 15px; margin: 3px 0; color: #b0a890; }
  #overlay .controls { margin-top: 12px; }
  #overlay .controls span { color: #c4a35a; font-weight: bold; }
  #overlay .start-hint {
    font-size: 18px;
    color: #c4a35a;
    margin-top: 28px;
    animation: blink 1s infinite;
  }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="game"></canvas>
  <div id="ui">
    <span id="scoreDisplay">SCORE 000000</span>
    <span id="hiDisplay">HI 000000</span>
    <span id="livesDisplay"></span>
  </div>
  <div id="overlay">
    <div class="title-row">
      <h1>1942</h1>
    </div>
    <div class="subtitle">Pacific Theater</div>
    <div class="controls">
      <p><span>Arrow Keys / WASD</span> &mdash; Move</p>
      <p><span>Space</span> &mdash; Fire</p>
      <p><span>Shift</span> &mdash; Barrel Roll (dodge)</p>
      <p><span>P</span> &mdash; Pause</p>
    </div>
    <p class="start-hint">PRESS SPACE TO SORTIE</p>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');

const W = 480, H = 720;
canvas.width = W; canvas.height = H;

const scoreEl = document.getElementById('scoreDisplay');
const hiEl = document.getElementById('hiDisplay');
const livesEl = document.getElementById('livesDisplay');

let hiScore = parseInt(localStorage.getItem('1942hi') || '0');
hiEl.textContent = 'HI ' + String(hiScore).padStart(6, '0');

// --- AUDIO ENGINE (Web Audio API) ---
let audioCtx = null;
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(type) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  if (type === 'shoot') {
    osc.type = 'square';
    osc.frequency.setValueAtTime(800, now);
    osc.frequency.exponentialRampToValueAtTime(200, now + 0.08);
    gain.gain.setValueAtTime(0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
    osc.start(now); osc.stop(now + 0.08);
  } else if (type === 'hit') {
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(300, now);
    osc.frequency.exponentialRampToValueAtTime(80, now + 0.15);
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
    osc.start(now); osc.stop(now + 0.15);
  } else if (type === 'explode') {
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(150, now);
    osc.frequency.exponentialRampToValueAtTime(30, now + 0.4);
    gain.gain.setValueAtTime(0.25, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
    osc.start(now); osc.stop(now + 0.4);
    // Noise burst
    const bufSize = audioCtx.sampleRate * 0.3;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
    const noise = audioCtx.createBufferSource();
    noise.buffer = buf;
    const ng = audioCtx.createGain();
    ng.gain.setValueAtTime(0.15, now);
    ng.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
    noise.connect(ng); ng.connect(audioCtx.destination);
    noise.start(now); noise.stop(now + 0.3);
  } else if (type === 'powerup') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(400, now);
    osc.frequency.exponentialRampToValueAtTime(900, now + 0.15);
    gain.gain.setValueAtTime(0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
    osc.start(now); osc.stop(now + 0.2);
  } else if (type === 'roll') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(200, now);
    osc.frequency.linearRampToValueAtTime(400, now + 0.1);
    osc.frequency.linearRampToValueAtTime(200, now + 0.2);
    gain.gain.setValueAtTime(0.1, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
    osc.start(now); osc.stop(now + 0.2);
  } else if (type === 'playerHit') {
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, now);
    osc.frequency.exponentialRampToValueAtTime(40, now + 0.5);
    gain.gain.setValueAtTime(0.3, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
    osc.start(now); osc.stop(now + 0.5);
  }
}

// --- INPUT ---
const keys = {};
function barrelRoll(dir) {
  if (!player.rolling && player.rollCooldown <= 0 && dir !== 0) {
    player.rolling = true;
    player.rollTimer = player.rollDuration;
    player.rollDir = dir;
    player.invincible = Math.max(player.invincible, player.rollDuration + 5);
    playSound('roll');
  }
}
window.addEventListener('keydown', e => {
  const shiftHeld = keys['ShiftLeft'] || keys['ShiftRight'];
  const left = e.code === 'ArrowLeft' || e.code === 'KeyA';
  const right = e.code === 'ArrowRight' || e.code === 'KeyD';
  if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
    if (!keys['ShiftLeft'] && !keys['ShiftRight']) {
      if (keys['ArrowLeft'] || keys['KeyA']) barrelRoll(-1);
      else if (keys['ArrowRight'] || keys['KeyD']) barrelRoll(1);
    }
  } else if (left || right) {
    if (shiftHeld) barrelRoll(left ? -1 : 1);
  }
  keys[e.code] = true;
  if (e.code === 'Space') e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// --- OCEAN ---
const WAVE_COUNT = 14;
const waves = [];
for (let i = 0; i < WAVE_COUNT; i++) {
  waves.push({ x: Math.random() * W, y: Math.random() * H, speed: 0.3 + Math.random() * 0.7, width: 30 + Math.random() * 60, phase: Math.random() * Math.PI * 2 });
}
const CLOUD_COUNT = 5;
const clouds = [];
for (let i = 0; i < CLOUD_COUNT; i++) {
  clouds.push({ x: Math.random() * W, y: Math.random() * H, speed: 0.3 + Math.random() * 0.4, w: 40 + Math.random() * 80, h: 15 + Math.random() * 20, o: 0.12 + Math.random() * 0.18 });
}
const ISLAND_COUNT = 3;
const islands = [];
for (let i = 0; i < ISLAND_COUNT; i++) {
  islands.push({ x: Math.random() * W, y: Math.random() * H * 2, speed: 0.5, size: 8 + Math.random() * 15 });
}

function drawOcean(t) {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1a4a7a');
  grad.addColorStop(0.3, '#1e5588');
  grad.addColorStop(0.7, '#1a5080');
  grad.addColorStop(1, '#16406a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(100,180,255,0.1)';
  ctx.lineWidth = 1.5;
  for (const w of waves) {
    if (state !== 'paused') {
      w.y += w.speed;
      if (w.y > H + 10) { w.y = -10; w.x = Math.random() * W; }
    }
    ctx.beginPath();
    for (let i = 0; i < w.width; i += 4) {
      const wx = w.x + i, wy = w.y + Math.sin(t * 0.002 + w.phase + i * 0.08) * 3;
      i === 0 ? ctx.moveTo(wx, wy) : ctx.lineTo(wx, wy);
    }
    ctx.stroke();
  }
  ctx.fillStyle = 'rgba(200,230,255,0.06)';
  for (let i = 0; i < 15; i++) {
    ctx.fillRect((i * 73 + t * 0.3) % W, (i * 137 + t * 0.15) % H, 2, 1);
  }
}

function drawClouds() {
  for (const c of clouds) {
    if (state !== 'paused') {
      c.y += c.speed;
      if (c.y > H + 30) { c.y = -30; c.x = Math.random() * W; }
    }
    ctx.save();
    ctx.globalAlpha = c.o;
    ctx.fillStyle = '#c8d8e8';
    ctx.beginPath(); ctx.ellipse(c.x, c.y, c.w * 0.5, c.h * 0.4, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(c.x - c.w * 0.25, c.y + 2, c.w * 0.3, c.h * 0.35, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(c.x + c.w * 0.3, c.y + 1, c.w * 0.25, c.h * 0.3, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}

function drawIslands() {
  for (const isl of islands) {
    if (state !== 'paused') {
      isl.y += isl.speed;
      if (isl.y > H + 30) { isl.y = -30; isl.x = Math.random() * W; }
    }
    ctx.save();
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#c8b070';
    ctx.beginPath(); ctx.ellipse(isl.x, isl.y, isl.size, isl.size * 0.6, 0.2, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#3a6a30';
    ctx.beginPath(); ctx.ellipse(isl.x, isl.y, isl.size * 0.6, isl.size * 0.35, 0.2, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}

// --- PLAYER: P-38 LIGHTNING ---
function drawPlayerPlane(x, y, invincible, rollAngle, t) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rollAngle);
  if (invincible && Math.floor(t / 100) % 2 === 0) ctx.globalAlpha = 0.3;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.beginPath(); ctx.ellipse(3, 5, 22, 8, 0, 0, Math.PI * 2); ctx.fill();

  // Tail booms
  ctx.fillStyle = '#3a5a30';
  ctx.fillRect(-16, 4, 5, 18); ctx.fillRect(-18, 18, 9, 4);
  ctx.fillRect(11, 4, 5, 18); ctx.fillRect(9, 18, 9, 4);

  // Wings
  ctx.fillStyle = '#4a6a3a';
  ctx.beginPath();
  ctx.moveTo(-28, 10); ctx.lineTo(-10, -2); ctx.lineTo(10, -2);
  ctx.lineTo(28, 10); ctx.lineTo(22, 12); ctx.lineTo(-22, 12);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#5a7a4a';
  ctx.beginPath();
  ctx.moveTo(-24, 10); ctx.lineTo(-10, 1); ctx.lineTo(10, 1);
  ctx.lineTo(24, 10); ctx.lineTo(18, 11); ctx.lineTo(-18, 11);
  ctx.closePath(); ctx.fill();

  // Fuselage
  ctx.fillStyle = '#3a5a30';
  ctx.beginPath(); ctx.moveTo(0, -22); ctx.lineTo(-7, -4); ctx.lineTo(7, -4); ctx.closePath(); ctx.fill();

  // Nose
  ctx.fillStyle = '#8a8a7a';
  ctx.beginPath(); ctx.moveTo(0, -24); ctx.lineTo(-4, -18); ctx.lineTo(4, -18); ctx.closePath(); ctx.fill();

  // Cockpit
  ctx.fillStyle = '#6aaaca';
  ctx.beginPath(); ctx.ellipse(0, -10, 4, 7, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#3a5a30'; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.ellipse(0, -10, 4, 7, 0, 0, Math.PI * 2); ctx.stroke();

  // Engines
  ctx.fillStyle = '#555';
  ctx.beginPath(); ctx.ellipse(-18, 6, 4, 6, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(18, 6, 4, 6, 0, 0, Math.PI * 2); ctx.fill();

  // Props
  const pp = t * 0.03;
  ctx.strokeStyle = 'rgba(180,180,160,0.45)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.ellipse(-18, 6, 8, 3, pp, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(18, 6, 8, 3, -pp, 0, Math.PI * 2); ctx.stroke();

  // US star insignia
  ctx.fillStyle = '#e8e0d0';
  ctx.beginPath(); ctx.arc(-14, 7, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#2a3a8a';
  ctx.beginPath(); ctx.arc(-14, 7, 1.8, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#e8e0d0';
  ctx.beginPath(); ctx.arc(14, 7, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#2a3a8a';
  ctx.beginPath(); ctx.arc(14, 7, 1.8, 0, Math.PI * 2); ctx.fill();

  // Exhaust
  ctx.globalAlpha = invincible && Math.floor(t / 100) % 2 === 0 ? 0.1 : 0.25;
  ctx.fillStyle = '#aaa';
  const exLen = 6 + Math.random() * 4;
  ctx.fillRect(-17, 22, 2, exLen);
  ctx.fillRect(15, 22, 2, exLen);

  ctx.restore();
}

// Small plane icon for lives
function drawMiniPlane(cx, cy, s) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(s, s);
  ctx.fillStyle = '#4a6a3a';
  ctx.beginPath(); ctx.moveTo(0, -6); ctx.lineTo(-3, 2); ctx.lineTo(3, 2); ctx.closePath(); ctx.fill();
  ctx.fillRect(-8, 0, 16, 3);
  ctx.fillStyle = '#3a5a30';
  ctx.fillRect(-2, 2, 1, 5); ctx.fillRect(1, 2, 1, 5);
  ctx.restore();
}

// --- ENEMY PLANES: JAPANESE ZEROS ---
function drawZero(x, y, type, hitFlash, angle, t) {
  ctx.save();
  ctx.translate(x, y);
  if (angle) ctx.rotate(angle);
  if (hitFlash > 0) ctx.globalAlpha = 0.4 + Math.random() * 0.6;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  ctx.beginPath(); ctx.ellipse(2, 4, 14, 5, 0, 0, Math.PI * 2); ctx.fill();

  if (type === 'bomber') {
    ctx.fillStyle = '#4a5040';
    ctx.beginPath(); ctx.moveTo(0, 22); ctx.lineTo(-14, -4); ctx.lineTo(-10, -12); ctx.lineTo(10, -12); ctx.lineTo(14, -4); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#3a4030';
    ctx.beginPath(); ctx.moveTo(-34, 2); ctx.lineTo(-10, -4); ctx.lineTo(-10, 8); ctx.lineTo(-34, 8); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(34, 2); ctx.lineTo(10, -4); ctx.lineTo(10, 8); ctx.lineTo(34, 8); ctx.closePath(); ctx.fill();
    // Hinomaru
    ctx.fillStyle = '#cc2222'; ctx.beginPath(); ctx.arc(0, 8, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(0, 8, 3.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#cc2222'; ctx.beginPath(); ctx.arc(0, 8, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#556655'; ctx.beginPath(); ctx.ellipse(0, -6, 5, 4, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#333'; ctx.fillRect(-4, 14, 8, 3);
  } else if (type === 'ace') {
    ctx.fillStyle = '#d8d0c0';
    ctx.beginPath(); ctx.moveTo(0, 18); ctx.lineTo(-12, -4); ctx.lineTo(-8, -14); ctx.lineTo(8, -14); ctx.lineTo(12, -4); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#c8c0b0';
    ctx.beginPath(); ctx.moveTo(-26, 4); ctx.lineTo(-8, -2); ctx.lineTo(-8, 10); ctx.lineTo(-26, 10); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(26, 4); ctx.lineTo(8, -2); ctx.lineTo(8, 10); ctx.lineTo(26, 10); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#cc2222'; ctx.fillRect(-26, 4, 5, 6); ctx.fillRect(21, 4, 5, 6);
    // Hinomaru
    ctx.fillStyle = '#cc2222'; ctx.beginPath(); ctx.arc(-14, 7, 3.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(-14, 7, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#cc2222'; ctx.beginPath(); ctx.arc(-14, 7, 1.8, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#cc2222'; ctx.beginPath(); ctx.arc(14, 7, 3.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(14, 7, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#cc2222'; ctx.beginPath(); ctx.arc(14, 7, 1.8, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#888'; ctx.beginPath(); ctx.moveTo(0, -16); ctx.lineTo(-3, -12); ctx.lineTo(3, -12); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#556'; ctx.beginPath(); ctx.ellipse(0, -6, 4, 5, 0, 0, Math.PI * 2); ctx.fill();
    const pp = t * 0.04;
    ctx.strokeStyle = 'rgba(100,100,90,0.45)'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.ellipse(0, -16, 7, 2, pp, 0, Math.PI * 2); ctx.stroke();
  } else {
    const gray = type === 'zigzag' ? '#c0b8a8' : '#d0c8b8';
    const dk = type === 'zigzag' ? '#a09888' : '#b0a898';
    ctx.fillStyle = gray;
    ctx.beginPath(); ctx.moveTo(0, 16); ctx.lineTo(-10, -4); ctx.lineTo(-7, -12); ctx.lineTo(7, -12); ctx.lineTo(10, -4); ctx.closePath(); ctx.fill();
    ctx.fillStyle = dk;
    ctx.beginPath(); ctx.moveTo(-22, 4); ctx.lineTo(-7, -2); ctx.lineTo(-7, 8); ctx.lineTo(-22, 8); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(22, 4); ctx.lineTo(7, -2); ctx.lineTo(7, 8); ctx.lineTo(22, 8); ctx.closePath(); ctx.fill();
    // Hinomaru
    ctx.fillStyle = '#cc2222'; ctx.beginPath(); ctx.arc(0, 6, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(0, 6, 2.8, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#cc2222'; ctx.beginPath(); ctx.arc(0, 6, 2, 0, Math.PI * 2); ctx.fill();
    // Nose
    ctx.fillStyle = '#888'; ctx.beginPath(); ctx.moveTo(0, -14); ctx.lineTo(-3, -10); ctx.lineTo(3, -10); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#556'; ctx.beginPath(); ctx.ellipse(0, -5, 3.5, 4, 0, 0, Math.PI * 2); ctx.fill();
    const pp = t * 0.035;
    ctx.strokeStyle = 'rgba(100,100,90,0.4)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.ellipse(0, -14, 6, 2, pp, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = gray;
    ctx.beginPath(); ctx.moveTo(0, 16); ctx.lineTo(-4, 20); ctx.lineTo(4, 20); ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

// --- BULLETS ---
function drawBullet(b) {
  if (b.isPlayer) {
    ctx.fillStyle = '#ffe066';
    ctx.shadowColor = '#ffcc00'; ctx.shadowBlur = 4;
    ctx.fillRect(b.x - 1, b.y - 4, 2, 8);
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,224,102,0.3)';
    ctx.fillRect(b.x - 0.5, b.y, 1, 6);
  } else {
    ctx.fillStyle = '#ee6633';
    ctx.beginPath(); ctx.arc(b.x, b.y, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ffaa66';
    ctx.beginPath(); ctx.arc(b.x, b.y, 1.2, 0, Math.PI * 2); ctx.fill();
  }
}

// --- EXPLOSIONS (pixel-art style) ---
function drawExplosion(ex) {
  const p = ex.timer / ex.maxTimer;
  const r = ex.radius * (1 - p * 0.2);
  ctx.save();

  // Smoke
  ctx.globalAlpha = p * 0.35;
  ctx.fillStyle = '#444';
  ctx.beginPath(); ctx.arc(ex.x, ex.y, r * 1.4, 0, Math.PI * 2); ctx.fill();

  // Outer fire ring
  ctx.globalAlpha = p * 0.7;
  ctx.fillStyle = '#cc3300';
  const segs = 8;
  for (let i = 0; i < segs; i++) {
    const a = (i / segs) * Math.PI * 2 + ex.timer * 0.12;
    const dr = r * (0.8 + Math.sin(i * 3 + ex.timer) * 0.2);
    ctx.beginPath();
    ctx.arc(ex.x + Math.cos(a) * dr * 0.3, ex.y + Math.sin(a) * dr * 0.3, r * 0.45, 0, Math.PI * 2);
    ctx.fill();
  }

  // Fire inner
  ctx.fillStyle = '#ff6600';
  ctx.beginPath(); ctx.arc(ex.x, ex.y, r * 0.55, 0, Math.PI * 2); ctx.fill();

  // Bright core
  ctx.fillStyle = '#ffcc22';
  ctx.beginPath(); ctx.arc(ex.x, ex.y, r * 0.3, 0, Math.PI * 2); ctx.fill();

  // White hot
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(ex.x, ex.y, r * 0.12, 0, Math.PI * 2); ctx.fill();

  // Debris
  ctx.globalAlpha = p;
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2 + ex.timer * 0.15;
    const d = r * (1.2 - p * 0.4);
    ctx.fillStyle = i % 2 ? '#ff8800' : '#ffcc00';
    ctx.fillRect(ex.x + Math.cos(a) * d - 1.5, ex.y + Math.sin(a) * d - 1.5, 3, 3);
  }
  ctx.restore();
}

// --- POWER-UPS ---
function drawPowerUpItem(p, t) {
  ctx.save();
  const bob = Math.sin(t / 300) * 3;
  const y = p.y + bob;
  // Crate
  ctx.fillStyle = '#8a7a5a';
  ctx.fillRect(p.x - 6, y - 2, 12, 10);
  ctx.strokeStyle = '#5a4a3a'; ctx.lineWidth = 1;
  ctx.strokeRect(p.x - 6, y - 2, 12, 10);
  // Cross
  ctx.strokeStyle = '#cc2222'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(p.x - 3, y + 3); ctx.lineTo(p.x + 3, y + 3);
  ctx.moveTo(p.x, y); ctx.lineTo(p.x, y + 6);
  ctx.stroke();
  // Parachute
  const colors = { speed: '#4488cc', double: '#44aa44', spin: '#ccaa22', life: '#cc4444' };
  ctx.strokeStyle = '#aaa'; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(p.x - 4, y - 2); ctx.lineTo(p.x - 2, y - 10); ctx.moveTo(p.x + 4, y - 2); ctx.lineTo(p.x + 2, y - 10); ctx.stroke();
  ctx.fillStyle = colors[p.powerType] || '#888';
  ctx.beginPath(); ctx.arc(p.x, y - 14, 7, Math.PI, 0); ctx.fill();
  // Glow
  ctx.strokeStyle = ctx.fillStyle;
  ctx.globalAlpha = 0.2 + Math.sin(t / 200) * 0.2;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(p.x, y, 14, 0, Math.PI * 2); ctx.stroke();
  ctx.restore();
}

// --- GAME STATE ---
let state = 'title';
let score = 0;
let lives = 3;
let wave = 0;
let waveTimer = 0;
let waveDelay = 180;
let combo = 0;
let comboTimer = 0;

const player = {
  x: W / 2, y: H - 80,
  speed: 5,
  fireTimer: 0, fireRate: 8,
  invincible: 0,
  powerLevel: 0,
  hasSpeed: false, hasSpin: false, spinAngle: 0,
  // Barrel roll
  rolling: false, rollTimer: 0, rollDuration: 20,
  rollCooldown: 0, rollAngle: 0,
  rollDir: 0 // -1 left, 1 right
};

let bullets = [], enemies = [], explosions = [], powerUps = [];

// Enemy flight path data
function addFlightPath(e) {
  // Each enemy gets a path function for looping behavior
  e.age = 0;
  e.pathType = e.pathType || 'straight';
  e.pathData = e.pathData || {};
  e.entryX = e.x;
  e.entryY = e.y;
}

function updateEnemyPath(e) {
  e.age++;
  const t = e.age;

  if (e.pathType === 'loopLeft') {
    // Fly down, loop left, come back up partway, then exit down
    const phase = t * 0.025;
    if (t < 60) {
      // Entry: fly down
      e.y += e.vy;
    } else if (t < 180) {
      // Looping arc
      const lp = (t - 60) / 120;
      e.x = e.entryX + Math.sin(lp * Math.PI * 2) * 80;
      e.y = e.entryY + 80 + Math.cos(lp * Math.PI) * 60;
    } else {
      // Exit down
      e.y += e.vy;
    }
  } else if (e.pathType === 'loopRight') {
    const phase = t * 0.025;
    if (t < 60) {
      e.y += e.vy;
    } else if (t < 180) {
      const lp = (t - 60) / 120;
      e.x = e.entryX - Math.sin(lp * Math.PI * 2) * 80;
      e.y = e.entryY + 80 + Math.cos(lp * Math.PI) * 60;
    } else {
      e.y += e.vy;
    }
  } else if (e.pathType === 'swoopDive') {
    // Fly in from side, swoop down toward player, exit bottom
    if (t < 40) {
      e.x += e.vx;
      e.y += 0.5;
    } else if (t < 120) {
      const sp = (t - 40) / 80;
      e.x += e.vx * (1 - sp * 0.5);
      e.y += 2 + sp * 3;
    } else {
      e.y += 3;
    }
  } else if (e.pathType === 'swoopLeft') {
    // Enter from right, arc left across screen, exit left
    if (t < 60) {
      e.x -= 2;
      e.y += 0.5;
    } else if (t < 160) {
      e.x -= 2.5;
      e.y += Math.sin((t - 60) * 0.05) * 1.5;
    } else {
      e.x -= 3;
    }
  } else if (e.pathType === 'swoopRight') {
    if (t < 60) {
      e.x += 2;
      e.y += 0.5;
    } else if (t < 160) {
      e.x += 2.5;
      e.y += Math.sin((t - 60) * 0.05) * 1.5;
    } else {
      e.x += 3;
    }
  } else if (e.pathType === 'hover') {
    // Hover at a position, then exit
    if (t < 30) {
      e.y += e.vy;
    } else if (t < 150) {
      e.y += Math.sin(t * 0.05) * 0.5;
      e.x += Math.cos(t * 0.03) * 0.8;
    } else {
      e.y += e.vy * 1.5;
    }
  } else {
    // Straight
    if (e.type === 'zigzag' && e.zigAmp) {
      e.x += Math.sin(Date.now() * e.zigFreq + e.zigOffset) * e.zigAmp * 0.05;
    }
    e.x += e.vx;
    e.y += e.vy;
    if (e.y > 100 && e.type === 'fighter') e.vy *= 0.99;
  }
}

function updateLivesDisplay() {
  livesEl.innerHTML = '';
  for (let i = 0; i < lives; i++) {
    const c = document.createElement('canvas');
    c.width = 20; c.height = 16;
    const cx = c.getContext('2d');
    cx.fillStyle = '#4a6a3a';
    cx.beginPath(); cx.moveTo(10, 2); cx.lineTo(7, 10); cx.lineTo(13, 10); cx.closePath(); cx.fill();
    cx.fillRect(3, 7, 14, 2.5);
    cx.fillStyle = '#3a5a30';
    cx.fillRect(9, 9, 2, 5); cx.fillRect(10, 9, 2, 5);
    livesEl.appendChild(c);
  }
}

function createEnemy(type, x, y, vx, vy, pathType) {
  const base = { type, x, y, vx, vy, hp: 1, maxHp: 1, scoreValue: 100, shootTimer: 120 + Math.random() * 120, hitFlash: 0, pathType: pathType || 'straight', age: 0, entryX: x, entryY: y };
  if (type === 'fighter') { base.hp = 1; base.maxHp = 1; base.scoreValue = 100; }
  else if (type === 'zigzag') { base.hp = 2; base.maxHp = 2; base.scoreValue = 200; }
  else if (type === 'formation') { base.hp = 1; base.maxHp = 1; base.scoreValue = 150; }
  else if (type === 'bomber') { base.hp = 5; base.maxHp = 5; base.scoreValue = 500; }
  else if (type === 'ace') { base.hp = 10; base.maxHp = 10; base.scoreValue = 1000; }
  return base;
}

function spawnWave() {
  wave++;
  waveTimer = waveDelay;
  const pathTypes = ['straight', 'loopLeft', 'loopRight', 'swoopDive', 'swoopLeft', 'swoopRight', 'hover'];

  const formations = [
    // 1: V formation from top
    () => {
      for (let i = 0; i < 5; i++) {
        const e = createEnemy('fighter', W / 2 + (i - 2) * 40, -30 - i * 15, 0, 1.5);
        e.pathType = 'loopLeft';
        enemies.push(e);
      }
    },
    // 2: Side pincers
    () => {
      for (let i = 0; i < 4; i++) {
        const e = createEnemy('fighter', -20, 50 + i * 60, 1.5, 1);
        e.pathType = 'swoopRight';
        enemies.push(e);
      }
      for (let i = 0; i < 4; i++) {
        const e = createEnemy('fighter', W + 20, 50 + i * 60, -1.5, 1);
        e.pathType = 'swoopLeft';
        enemies.push(e);
      }
    },
    // 3: Zigzag sweep
    () => {
      for (let i = 0; i < 6; i++) {
        const e = createEnemy('zigzag', 60 + i * 70, -30, 0, 2);
        e.zigAmp = 40 + Math.random() * 30;
        e.zigFreq = 0.03 + Math.random() * 0.02;
        e.zigOffset = Math.random() * Math.PI * 2;
        e.pathType = 'straight';
        enemies.push(e);
      }
    },
    // 4: Grid formation
    () => {
      for (let row = 0; row < 3; row++) {
        for (let col = 0; col < 4; col++) {
          const e = createEnemy('formation', W / 2 + (col - 1.5) * 35, -40 - row * 30, 0, 1.2);
          e.pathType = 'hover';
          enemies.push(e);
        }
      }
    },
    // 5: Bomber with looping escorts
    () => {
      const b = createEnemy('bomber', W / 2, -40, 0, 0.8);
      b.pathType = 'hover';
      enemies.push(b);
      for (let i = 0; i < 4; i++) {
        const side = i % 2 === 0 ? -1 : 1;
        const e = createEnemy('fighter', W / 2 + side * 60, -60 - Math.floor(i / 2) * 40, 0, 1.2);
        e.pathType = i % 2 === 0 ? 'loopLeft' : 'loopRight';
        enemies.push(e);
      }
    },
    // 6: Mixed ambush
    () => {
      for (let i = 0; i < 6; i++) {
        const e = createEnemy('fighter', Math.random() * (W - 40) + 20, -30 - Math.random() * 40, 0, 1 + Math.random());
        e.pathType = pathTypes[Math.floor(Math.random() * 3)];
        enemies.push(e);
      }
      for (let i = 0; i < 3; i++) {
        const e = createEnemy('zigzag', -20, 100 + i * 100, 2, 1.5);
        e.pathType = 'swoopRight';
        enemies.push(e);
      }
    },
    // 7: Dense formation grid
    () => {
      for (let row = 0; row < 4; row++) {
        for (let col = 0; col < 5; col++) {
          const e = createEnemy('formation', 60 + col * 80, -40 - row * 35, 0, 1.5);
          e.pathType = row % 2 === 0 ? 'loopLeft' : 'loopRight';
          enemies.push(e);
        }
      }
    },
    // 8: Ace with orbiting escorts
    () => {
      const ace = createEnemy('ace', W / 2, -40, 0, 1);
      ace.hp = 15; ace.maxHp = 15; ace.shootTimer = 60;
      ace.pathType = 'hover';
      enemies.push(ace);
      for (let i = 0; i < 6; i++) {
        const angle = (i / 6) * Math.PI * 2;
        const e = createEnemy('fighter', W / 2 + Math.cos(angle) * 70, -40 + Math.sin(angle) * 70, 0, 1.2);
        e.escort = true; e.escortTarget = ace; e.escortAngle = angle;
        e.pathType = 'straight';
        enemies.push(e);
      }
    },
    // 9: Cross-fire
    () => {
      for (let i = 0; i < 5; i++) {
        const e = createEnemy('zigzag', -20, 20 + i * 60, 2.5, 1.5);
        e.pathType = 'swoopRight';
        enemies.push(e);
      }
      for (let i = 0; i < 5; i++) {
        const e = createEnemy('zigzag', W + 20, 20 + i * 60, -2.5, 1.5);
        e.pathType = 'swoopLeft';
        enemies.push(e);
      }
    },
    // 10: Boss wave
    () => {
      const ace = createEnemy('ace', W / 2, -60, 0, 0.6);
      ace.hp = 30; ace.maxHp = 30; ace.shootTimer = 40; ace.boss = true;
      ace.pathType = 'hover';
      enemies.push(ace);
    }
  ];

  const idx = (wave - 1) % formations.length;
  formations[idx]();

  if (wave > formations.length) {
    const mult = 1 + (wave - formations.length) * 0.15;
    for (const e of enemies) {
      e.hp = Math.ceil(e.hp * mult);
      e.maxHp = e.hp;
      e.scoreValue = Math.ceil(e.scoreValue * mult);
    }
  }
}

function resetGame() {
  score = 0; lives = 3; wave = 0; waveTimer = 60;
  combo = 0; comboTimer = 0;
  player.x = W / 2; player.y = H - 80;
  player.invincible = 120;
  player.powerLevel = 0; player.hasSpeed = false; player.hasSpin = false;
  player.rolling = false; player.rollTimer = 0; player.rollCooldown = 0; player.rollAngle = 0;
  bullets = []; enemies = []; explosions = []; powerUps = [];
  updateLivesDisplay();
}

function gameOver() {
  state = 'gameover';
  if (score > hiScore) {
    hiScore = score;
    localStorage.setItem('1942hi', hiScore);
    hiEl.textContent = 'HI ' + String(hiScore).padStart(6, '0');
  }
  overlay.style.display = 'flex';
  overlay.innerHTML = '<h2>MISSION FAILED</h2><p>SCORE: ' + String(score).padStart(6, '0') + '</p><p>HIGH SCORE: ' + String(hiScore).padStart(6, '0') + '</p><p>WAVE: ' + wave + '</p><p class="start-hint">PRESS SPACE TO RE-BOARD</p>';
}

let lastTime = 0, accumulator = 0, pauseTime = 0;
const TIMESTEP = 1000 / 60;

function update() {
  // Roll update
  if (player.rolling) {
    player.rollTimer--;
    const progress = 1 - player.rollTimer / player.rollDuration;
    player.rollAngle = player.rollDir * Math.sin(progress * Math.PI) * 0.6;
    if (player.rollTimer <= 0) {
      player.rolling = false;
      player.rollCooldown = 30;
      player.rollAngle = 0;
    }
  }
  if (player.rollCooldown > 0) player.rollCooldown--;

  // Movement
  const speed = player.hasSpeed ? 7 : 5;
  if (!player.rolling) {
    if (keys['ArrowLeft'] || keys['KeyA']) player.x -= speed;
    if (keys['ArrowRight'] || keys['KeyD']) player.x += speed;
    if (keys['ArrowUp'] || keys['KeyW']) player.y -= speed;
    if (keys['ArrowDown'] || keys['KeyS']) player.y += speed;
  }
  player.x = Math.max(20, Math.min(W - 20, player.x));
  player.y = Math.max(30, Math.min(H - 20, player.y));

  // Shooting
  player.fireTimer--;
  if (keys['Space'] && player.fireTimer <= 0) {
    player.fireTimer = player.fireRate;
    playSound('shoot');
    if (player.hasSpin) {
      player.spinAngle += 0.3;
      for (let i = 0; i < 3; i++) {
        const angle = player.spinAngle + (i / 3) * Math.PI * 2;
        bullets.push({ x: player.x, y: player.y - 10, vx: Math.cos(angle) * 4, vy: -4 + Math.sin(angle) * 1.5, isPlayer: true, damage: 1 });
      }
    } else {
      bullets.push({ x: player.x, y: player.y - 22, vx: 0, vy: -9, isPlayer: true, damage: 1 });
      if (player.powerLevel >= 1) {
        bullets.push({ x: player.x - 10, y: player.y - 16, vx: 0, vy: -9, isPlayer: true, damage: 1 });
        bullets.push({ x: player.x + 10, y: player.y - 16, vx: 0, vy: -9, isPlayer: true, damage: 1 });
      }
      if (player.powerLevel >= 2) {
        bullets.push({ x: player.x - 16, y: player.y - 10, vx: -1, vy: -8, isPlayer: true, damage: 1 });
        bullets.push({ x: player.x + 16, y: player.y - 10, vx: 1, vy: -8, isPlayer: true, damage: 1 });
      }
    }
  }

  if (player.invincible > 0) player.invincible--;
  if (comboTimer > 0) { comboTimer--; if (comboTimer <= 0) combo = 0; }

  // Bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx; b.y += b.vy;
    if (b.y < -20 || b.y > H + 20 || b.x < -20 || b.x > W + 20) bullets.splice(i, 1);
  }

  // Wave spawning
  waveTimer--;
  if (waveTimer <= 0 && enemies.length === 0) spawnWave();

  // Enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (e.hitFlash > 0) e.hitFlash--;

    if (e.escort && e.escortTarget && e.escortTarget.hp > 0) {
      e.escortAngle += 0.02;
      const target = e.escortTarget;
      e.x += (target.x + Math.cos(e.escortAngle) * 70 - e.x) * 0.02;
      e.y += (target.y + Math.sin(e.escortAngle) * 70 - e.y) * 0.02;
    } else {
      updateEnemyPath(e);
    }

    // Shooting
    e.shootTimer--;
    if (e.shootTimer <= 0 && e.y > 0 && e.y < H - 100) {
      e.shootTimer = 80 + Math.random() * (e.type === 'ace' ? 30 : 80);
      const dx = player.x - e.x, dy = player.y - e.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const bSpeed = e.boss ? 3.5 : 2.5;
      bullets.push({ x: e.x, y: e.y + 10, vx: (dx / dist) * bSpeed, vy: (dy / dist) * bSpeed, isPlayer: false, damage: 1 });
      if (e.boss) {
        for (let s = -2; s <= 2; s++) {
          const angle = Math.atan2(dy, dx) + s * 0.2;
          bullets.push({ x: e.x, y: e.y + 10, vx: Math.cos(angle) * bSpeed, vy: Math.sin(angle) * bSpeed, isPlayer: false, damage: 1 });
        }
      }
    }

    if (e.y > H + 40 || e.x < -80 || e.x > W + 80) { enemies.splice(i, 1); continue; }
  }

  // Bullet-Enemy collision
  for (let bi = bullets.length - 1; bi >= 0; bi--) {
    const b = bullets[bi];
    if (!b.isPlayer) continue;
    for (let ei = enemies.length - 1; ei >= 0; ei--) {
      const e = enemies[ei];
      const dx = b.x - e.x, dy = b.y - e.y;
      const hitR = e.type === 'bomber' ? 24 : e.type === 'ace' ? 20 : 14;
      if (dx * dx + dy * dy < hitR * hitR) {
        e.hp -= b.damage; e.hitFlash = 4;
        bullets.splice(bi, 1);
        playSound('hit');
        if (e.hp <= 0) {
          combo++; comboTimer = 120;
          score += e.scoreValue * Math.min(combo, 10);
          scoreEl.textContent = 'SCORE ' + String(score).padStart(6, '0');
          explosions.push({ x: e.x, y: e.y, radius: e.type === 'bomber' || e.boss ? 35 : 25, timer: 30, maxTimer: 30 });
          playSound('explode');
          if (Math.random() < (e.type === 'ace' || e.boss ? 0.8 : 0.08)) {
            const types = ['speed', 'double', 'spin', 'life'];
            const weights = [3, 3, 2, 1];
            let total = 9, r = Math.random() * total, ptype = types[0];
            for (let t = 0; t < types.length; t++) { r -= weights[t]; if (r <= 0) { ptype = types[t]; break; } }
            powerUps.push({ x: e.x, y: e.y, vy: 1.5, powerType: ptype });
          }
          enemies.splice(ei, 1);
        }
        break;
      }
    }
  }

  // Enemy bullet -> Player
  if (player.invincible <= 0) {
    for (let bi = bullets.length - 1; bi >= 0; bi--) {
      const b = bullets[bi];
      if (b.isPlayer) continue;
      const dx = b.x - player.x, dy = b.y - player.y;
      if (dx * dx + dy * dy < 14 * 14) { bullets.splice(bi, 1); playerHit(); break; }
    }
  }

  // Enemy -> Player collision
  if (player.invincible <= 0) {
    for (const e of enemies) {
      const dx = e.x - player.x, dy = e.y - player.y;
      const r = e.type === 'bomber' ? 24 : 16;
      if (dx * dx + dy * dy < (r + 12) * (r + 12)) { playerHit(); break; }
    }
  }

  // Power-ups
  for (let i = powerUps.length - 1; i >= 0; i--) {
    const p = powerUps[i];
    p.y += p.vy;
    if (p.y > H + 20) { powerUps.splice(i, 1); continue; }
    const dx = p.x - player.x, dy = p.y - player.y;
    if (dx * dx + dy * dy < 20 * 20) {
      if (p.powerType === 'speed') player.hasSpeed = true;
      else if (p.powerType === 'double') player.powerLevel = Math.min(player.powerLevel + 1, 2);
      else if (p.powerType === 'spin') player.hasSpin = true;
      else if (p.powerType === 'life') { lives = Math.min(lives + 1, 5); updateLivesDisplay(); }
      playSound('powerup');
      explosions.push({ x: p.x, y: p.y, radius: 15, timer: 15, maxTimer: 15 });
      powerUps.splice(i, 1);
    }
  }

  // Explosions
  for (let i = explosions.length - 1; i >= 0; i--) {
    explosions[i].timer--;
    if (explosions[i].timer <= 0) explosions.splice(i, 1);
  }
}

function playerHit() {
  explosions.push({ x: player.x, y: player.y, radius: 30, timer: 30, maxTimer: 30 });
  playSound('playerHit');
  lives--; combo = 0; comboTimer = 0;
  updateLivesDisplay();
  if (lives <= 0) { gameOver(); return; }
  player.x = W / 2; player.y = H - 80;
  player.invincible = 180;
  player.powerLevel = Math.max(0, player.powerLevel - 1);
  player.hasSpeed = false; player.hasSpin = false;
  player.rolling = false; player.rollAngle = 0;
}

function draw() {
  const t = state === 'paused' ? pauseTime : Date.now();
  drawOcean(t);
  drawClouds();
  drawIslands();

  if (state === 'playing') {
    for (const p of powerUps) drawPowerUpItem(p, t);
    for (const b of bullets) drawBullet(b);
    for (const e of enemies) {
      drawZero(e.x, e.y, e.type, e.hitFlash, null, t);
      if ((e.type === 'bomber' || e.type === 'ace' || e.boss) && e.hp < e.maxHp) {
        const barW = 30, barH = 3, hpR = e.hp / e.maxHp;
        ctx.fillStyle = '#222'; ctx.fillRect(e.x - barW / 2, e.y - (e.type === 'bomber' ? 16 : 22), barW, barH);
        ctx.fillStyle = hpR > 0.5 ? '#4a8a3a' : hpR > 0.25 ? '#ccaa33' : '#cc3333';
        ctx.fillRect(e.x - barW / 2, e.y - (e.type === 'bomber' ? 16 : 22), barW * hpR, barH);
      }
    }
    for (const ex of explosions) drawExplosion(ex);
    drawPlayerPlane(player.x, player.y, player.invincible > 0, player.rollAngle, t);

    // Roll cooldown indicator
    if (player.rollCooldown > 0) {
      ctx.fillStyle = 'rgba(100,200,255,0.3)';
      ctx.fillRect(player.x - 15, player.y + 28, 30 * (1 - player.rollCooldown / 30), 2);
    }

    if (waveTimer > 0 && enemies.length === 0) {
      ctx.fillStyle = '#c4a35a';
      ctx.font = 'bold 22px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('WAVE ' + wave, W / 2, H / 2 - 40);
    }
    if (combo > 1) {
      ctx.fillStyle = '#c4a35a';
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('COMBO x' + Math.min(combo, 10), W / 2, 50);
    }
    if (player.powerLevel > 0 || player.hasSpeed || player.hasSpin) {
      ctx.fillStyle = '#8aaa7a';
      ctx.font = '11px monospace';
      ctx.textAlign = 'left';
      let px = 10;
      ctx.fillText('POWER:', px, H - 10);
      if (player.powerLevel >= 1) ctx.fillText('D', px + 60, H - 10);
      if (player.powerLevel >= 2) ctx.fillText('D', px + 72, H - 10);
      if (player.hasSpeed) ctx.fillText('S', px + 84, H - 10);
      if (player.hasSpin) ctx.fillText('*', px + 96, H - 10);
    }
  }
}

function gameLoop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  accumulator += timestamp - lastTime;
  lastTime = timestamp;
  if (state === 'playing') {
    while (accumulator >= TIMESTEP) { update(); accumulator -= TIMESTEP; }
  }
  draw();
  requestAnimationFrame(gameLoop);
}

window.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    if (state === 'title' || state === 'gameover') {
      initAudio();
      resetGame(); state = 'playing'; overlay.style.display = 'none';
    }
  }
  if (e.code === 'KeyP') {
    if (state === 'playing') {
      state = 'paused';
      pauseTime = performance.now();
      overlay.style.display = 'flex';
      overlay.innerHTML = '<h2>PAUSED</h2><p class="start-hint">PRESS P TO RESUME</p>';
    } else if (state === 'paused') {
      state = 'playing';
      lastTime = performance.now();
      accumulator = 0;
      overlay.style.display = 'none';
    }
  }
});

updateLivesDisplay();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
